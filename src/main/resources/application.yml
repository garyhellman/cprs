spring:
  application:
    name: cprsadmin
  datasource:
    url: jdbc:h2:mem:cars;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080

logging:
  level:
    org.acs.cprs: DEBUG
    org.hibernate.SQL: DEBUG
